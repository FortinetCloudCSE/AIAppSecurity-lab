AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a VPC, security group, key pair, Ubuntu EC2 instance for AIAPP with SSM access.

Parameters:
  LatestUbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
    Description: Latest Ubuntu 24.04 LTS AMI from the public SSM parameter store

Resources:

  # VPC
  AIAPPVPC:
    Type: AWS::EC2::VPC
    Properties: 
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: "true"
      EnableDnsHostnames: "true"
      Tags:
        - Key: Name
          Value: AIAPP-VPC

  # Subnet (Public)
  AIAPPSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AIAPPVPC
      CidrBlock: "10.0.0.0/24"
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: "true"
      Tags:
        - Key: Name
          Value: AIAPP-Subnet

  # Internet Gateway (to allow internet access)
  AIAPPInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: AIAPP-InternetGateway

  # Attach Internet Gateway to VPC
  AIAPPAttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref AIAPPVPC
      InternetGatewayId: !Ref AIAPPInternetGateway

  # Route Table for Public Access
  AIAPPRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AIAPPVPC
      Tags:
        - Key: Name
          Value: AIAPP-PublicRouteTable

  # Route to Internet Gateway
  AIAPPRoute:
    Type: AWS::EC2::Route
    DependsOn: AIAPPAttachGateway
    Properties:
      RouteTableId: !Ref AIAPPRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref AIAPPInternetGateway

  # Associate Route Table with Subnet
  AIAPPRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AIAPPSubnet
      RouteTableId: !Ref AIAPPRouteTable

  # Security Group that allows SSH (port 22) from anywhere and outbound internet access
  AIAPPSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow SSH access and internet access"
      VpcId: !Ref AIAPPVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: '8080'
          ToPort: '8080'
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"  # Allow outbound access for SSM

  AIAPPBucketSuffixRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  AIAPPBucketSuffixFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt AIAPPBucketSuffixRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import random
          import urllib.request


          def send_response(event, context, status, data, physical_resource_id):
              body = json.dumps(
                  {
                      "Status": status,
                      "Reason": f"See CloudWatch Logs: {context.log_stream_name}",
                      "PhysicalResourceId": physical_resource_id,
                      "StackId": event["StackId"],
                      "RequestId": event["RequestId"],
                      "LogicalResourceId": event["LogicalResourceId"],
                      "Data": data,
                  }
              ).encode("utf-8")

              request = urllib.request.Request(
                  event["ResponseURL"],
                  data=body,
                  method="PUT",
                  headers={"content-type": "", "content-length": str(len(body))},
              )
              with urllib.request.urlopen(request):
                  return


          def handler(event, context):
              physical_resource_id = event.get("PhysicalResourceId", "aiapp-bucket-suffix")
              try:
                  if event["RequestType"] in {"Create", "Update"}:
                      suffix = str(random.randint(10000000, 99999999))
                      send_response(
                          event,
                          context,
                          "SUCCESS",
                          {"RandomNumber": suffix},
                          f"aiapp-bucket-suffix-{suffix}",
                      )
                  else:
                      send_response(event, context, "SUCCESS", {}, physical_resource_id)
              except Exception as exc:
                  send_response(
                      event,
                      context,
                      "FAILED",
                      {"Error": str(exc)},
                      physical_resource_id,
                  )

  AIAPPBucketSuffix:
    Type: Custom::AIAPPBucketSuffix
    Properties:
      ServiceToken: !GetAtt AIAPPBucketSuffixFunction.Arn

  AIAPPBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub
        - ai-bucket-${BucketSuffix}
        - BucketSuffix: !GetAtt AIAPPBucketSuffix.RandomNumber

  # IAM Role to allow EC2 instance to communicate with SSM
  AIAPPSsmRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: {"Fn::Join": ["", [{"Ref": "AWS::Region"}, "CloudLabRole"]]}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: Name
          Value: AIAPP-SSMRole

  # Attach IAM Role to EC2 Instance
  AIAPPInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AIAPPSsmRole

  # Key Pair (Automatically Created)
  AIAPPKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: AIAPPKey
      Tags:
        - Key: Name
          Value: AIAPPKey

  # Ubuntu EC2 Instance
  AIAPPEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !Ref LatestUbuntuAmiId
      SecurityGroupIds:
        - !Ref AIAPPSecurityGroup
      SubnetId: !Ref AIAPPSubnet
      KeyName: !Ref AIAPPKeyPair
      IamInstanceProfile: !Ref AIAPPInstanceProfile
      Tags:
        - Key: Name
          Value: AIAPP-UbuntuInstance
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            sudo apt update
            sudo apt install -y gnupg software-properties-common zip curl unzip snapd
            wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt update
            sudo apt install -y terraform
            sudo apt install -y nodejs npm
            sudo apt install -y docker.io
            sudo snap install amazon-ssm-agent --classic || true
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo systemctl enable snap.amazon-ssm-agent.amazon-ssm-agent.service || true
            sudo systemctl start snap.amazon-ssm-agent.amazon-ssm-agent.service || true
            sudo usermod -aG docker ubuntu
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -qq awscliv2.zip
            sudo ./aws/install

Outputs:

  InstanceId:
    Description: "Instance ID"
    Value: !Ref AIAPPEC2Instance

  VPCId:
    Description: "VPC ID"
    Value: !Ref AIAPPVPC

  SecurityGroupId:
    Description: "Security Group ID"
    Value: !Ref AIAPPSecurityGroup

  BucketName:
    Description: "S3 bucket name for the app"
    Value: !Ref AIAPPBucket

  InstancePublicIp:
    Description: "Public IP address of the EC2 instance"
    Value: !GetAtt AIAPPEC2Instance.PublicIp

  InstancePublicDns:
    Description: "Public DNS name of the EC2 instance"
    Value: !GetAtt AIAPPEC2Instance.PublicDnsName

  AppUrl:
    Description: "Application URL on port 8080"
    Value: !Sub "http://${AIAPPEC2Instance.PublicDnsName}:8080"

  SsmRoleName:
    Description: "IAM role attached for Systems Manager access"
    Value: !Ref AIAPPSsmRole

  KeyPairName:
    Description: "The name of the SSH key pair"
    Value: !Ref AIAPPKeyPair
