AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a VPC, security group, key pair, Ubuntu EC2 instance for FortiCNAPP Training with SSM access.

Parameters:
  LatestUbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
    Description: Latest Ubuntu 24.04 LTS AMI from the public SSM parameter store

Resources:

  # VPC
  FortiCNAPPVPC:
    Type: AWS::EC2::VPC
    Properties: 
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: "true"
      EnableDnsHostnames: "true"
      Tags:
        - Key: Name
          Value: FortiCNAPP-VPC

  # Subnet (Public)
  FortiCNAPPSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref FortiCNAPPVPC
      CidrBlock: "10.0.0.0/24"
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: "true"
      Tags:
        - Key: Name
          Value: FortiCNAPP-Subnet

  # Internet Gateway (to allow internet access)
  FortiCNAPPInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: FortiCNAPP-InternetGateway

  # Attach Internet Gateway to VPC
  FortiCNAPPAttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref FortiCNAPPVPC
      InternetGatewayId: !Ref FortiCNAPPInternetGateway

  # Route Table for Public Access
  FortiCNAPPRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref FortiCNAPPVPC
      Tags:
        - Key: Name
          Value: FortiCNAPP-PublicRouteTable

  # Route to Internet Gateway
  FortiCNAPPRoute:
    Type: AWS::EC2::Route
    DependsOn: FortiCNAPPAttachGateway
    Properties:
      RouteTableId: !Ref FortiCNAPPRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref FortiCNAPPInternetGateway

  # Associate Route Table with Subnet
  FortiCNAPPRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref FortiCNAPPSubnet
      RouteTableId: !Ref FortiCNAPPRouteTable

  # Security Group that allows SSH (port 22) from anywhere and outbound internet access
  FortiCNAPPSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow SSH access and internet access"
      VpcId: !Ref FortiCNAPPVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: '8080'
          ToPort: '8080'
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"  # Allow outbound access for SSM

  # IAM Role to allow EC2 instance to communicate with SSM
  FortiCNAPPSsmRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: {"Fn::Join": ["", [{"Ref": "AWS::Region"}, "CloudLabRole"]]}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: Name
          Value: FortiCNAPP-SSMRole

  # Attach IAM Role to EC2 Instance
  FortiCNAPPInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref FortiCNAPPSsmRole

  # Key Pair (Automatically Created)
  FortiCNAPPKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: FortiCNAPPKey
      Tags:
        - Key: Name
          Value: FortiCNAPPKey

  # Ubuntu EC2 Instance
  FortiCNAPPEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !Ref LatestUbuntuAmiId
      SecurityGroupIds:
        - !Ref FortiCNAPPSecurityGroup
      SubnetId: !Ref FortiCNAPPSubnet
      KeyName: !Ref FortiCNAPPKeyPair
      IamInstanceProfile: !Ref FortiCNAPPInstanceProfile
      Tags:
        - Key: Name
          Value: FortiCNAPP-UbuntuInstance
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            sudo apt update
            sudo apt install -y gnupg software-properties-common zip curl unzip
            wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt update
            sudo apt install -y terraform
            sudo apt install -y nodejs npm
            sudo apt install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker ubuntu
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -qq awscliv2.zip
            sudo ./aws/install

Outputs:

  InstanceId:
    Description: "Instance ID"
    Value: !Ref FortiCNAPPEC2Instance

  VPCId:
    Description: "VPC ID"
    Value: !Ref FortiCNAPPVPC

  SecurityGroupId:
    Description: "Security Group ID"
    Value: !Ref FortiCNAPPSecurityGroup

  KeyPairName:
    Description: "The name of the SSH key pair"
    Value: !Ref FortiCNAPPKeyPair
